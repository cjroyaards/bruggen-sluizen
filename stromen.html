<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Getijdestromen Noordzee — live (Copernicus Marine)</title>
<link rel="stylesheet" href="assets/leaflet.min.css">
<script src="assets/leaflet.min.js"></script>
<style>
  :root {
    color-scheme: light;
    --surface-1: #fcfcfb;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --muted: #898781;
    --border: rgba(11,11,11,0.10);
    --accent: #2a78d6;
    --hairline: #e1e0d9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --surface-1: #1a1a19;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --muted: #898781;
      --border: rgba(255,255,255,0.12);
      --accent: #3987e5;
      --hairline: #2c2c2a;
    }
  }
  html, body { margin:0; padding:0; height:100%; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  #app { display:flex; flex-direction:column; height:100%; }
  #map { flex:1; min-height:0; }
  header {
    background: var(--surface-1); color: var(--text-primary);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px; display:flex; flex-wrap:wrap; gap:10px 18px; align-items:center;
    z-index: 1200; position:relative;
  }
  header h1 { font-size: 15px; margin:0; font-weight:650; letter-spacing:-0.01em; }
  header .sub { font-size: 11.5px; color: var(--muted); }
  .timebox { display:flex; align-items:center; gap:10px; flex:1; min-width:280px; }
  .timebox button {
    border:1px solid var(--border); background:var(--surface-1); color:var(--text-primary);
    border-radius:8px; padding:4px 10px; font-size:13px; cursor:pointer; line-height:1.4;
  }
  .timebox button:hover { border-color: var(--accent); }
  .timebox button.primary { background: var(--accent); color:#fff; border-color:transparent; min-width:44px; }
  input[type=range] { flex:1; accent-color: var(--accent); min-width:120px; }
  #timeLabel { font-size:13px; font-weight:600; min-width:172px; text-align:right; font-variant-numeric: tabular-nums; }
  #status { font-size:11.5px; color:var(--text-secondary); }
  #status.err { color:#d03b3b; font-weight:600; }
  .panel {
    position:absolute; z-index:1100; background:var(--surface-1); color:var(--text-primary);
    border:1px solid var(--border); border-radius:10px; padding:10px 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.12); font-size:12px;
  }
  #layersPanel { top:12px; right:12px; }
  #layersPanel label { display:flex; gap:7px; align-items:center; margin:4px 0; cursor:pointer; color:var(--text-secondary); }
  #layersPanel label input { accent-color: var(--accent); }
  #layersPanel .t { font-weight:650; color:var(--text-primary); margin-bottom:2px; }
  #legend { bottom:24px; left:12px; }
  #legend .bar { width:190px; height:10px; border-radius:5px; margin:6px 0 3px;
    background: linear-gradient(to right,#9ec5f4,#6da7ec,#3987e5,#256abf,#184f95,#0d366b); }
  #legend .ticks { display:flex; justify-content:space-between; font-size:10.5px; color:var(--muted); font-variant-numeric:tabular-nums; }
  #legend .t { font-weight:650; }
  #legend .sub { color:var(--muted); font-size:10.5px; margin-top:2px; }
  .leaflet-container { font: inherit; background:#dfeaf2; }
  @media (prefers-color-scheme: dark){ .leaflet-container{ background:#0f1a24; } }
  .leaflet-popup-content { font-size:12.5px; line-height:1.5; }
  .leaflet-popup-content b { font-variant-numeric: tabular-nums; }
  #currentCanvas { position:absolute; inset:0; z-index:650; pointer-events:none; }
  .dirArrow { display:inline-block; font-size:15px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>Getijdestromen Noordzee &amp; Britse oostkust</h1>
      <div class="sub">Copernicus Marine Service · ondergrond OpenStreetMap</div>
    </div>
    <div class="timebox">
      <button id="playBtn" class="primary" title="Afspelen">▶</button>
      <button id="nowBtn" title="Naar huidig uur">Nu</button>
      <input type="range" id="timeSlider" min="0" max="71" step="0.04" value="0">
      <span id="timeLabel">—</span>
    </div>
    <div id="status">Stromingsdata laden…</div>
  </header>
  <div id="map"></div>
</div>

<div id="layersPanel" class="panel">
  <div class="t">Lagen</div>
  <label><input type="checkbox" id="cbWmts" checked> Copernicus pijlen</label>
  <label><input type="checkbox" id="cbParticles"> Deeltjesanimatie (rustig)</label>
  <label><input type="checkbox" id="cbArrows"> Eigen pijlen (vloeiend)</label>
  <label><input type="checkbox" id="cbCmems"> Copernicus kleurlaag</label>
</div>

<div id="legend" class="panel" style="display:none">
  <div class="t">Stroomsnelheid</div>
  <div class="bar"></div>
  <div class="ticks"><span>0</span><span>0,5</span><span>1</span><span>1,5</span><span>2</span><span>≥2,5 kn</span></div>
  <div class="sub">1 kn = 1,852 km/u · klik op zee voor details</div>
</div>

<script>
'use strict';
/* ================= configuratie ================= */
const GRID = { lat0: 50.0, dLat: 0.4, nLat: 28, lon0: -4.0, dLon: 0.6, nLon: 23 };
const NHOURS = 72;
const PLAY_HPS = 0.9;   // uren-per-seconde tijdens afspelen (vloeiend)
const CMEMS_LAYER = 'NWSHELF_ANALYSISFORECAST_PHY_004_013/cmems_mod_nws_phy-cur_anfc_1.5km-2D_PT1H-i_202511/sea_water_velocity';
const WMTS = 'https://wmts.marine.copernicus.eu/teroWmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0'
  + '&LAYER=' + encodeURIComponent(CMEMS_LAYER)
  + '&TILEMATRIXSET=EPSG:3857&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&FORMAT=image/png';

/* ================= kaart ================= */
const map = L.map('map', { center: [51.65, 3.75], zoom: 8, minZoom: 4, maxZoom: 11, zoomControl: true });
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>-bijdragers · stromingen: <a href="https://marine.copernicus.eu/">Copernicus Marine Service</a> (NWS 1,5 km / SMOC via <a href="https://open-meteo.com/">Open-Meteo</a>)'
}).addTo(map);
// panelen in de kaartcontainer (onder de header) + niet door de kaart laten wegvangen
['layersPanel', 'legend'].forEach(id => {
  const el = document.getElementById(id);
  map.getContainer().appendChild(el);
  L.DomEvent.disableClickPropagation(el);
  L.DomEvent.disableScrollPropagation(el);
});

function isoHour(unixSec) { return new Date(unixSec * 1000).toISOString().replace(/\.\d{3}Z$/, '.000Z'); }

function makeCmemsLayer(styleStr, opacity, timeIso, extra) {
  return L.tileLayer(WMTS + '&STYLE=' + encodeURIComponent(styleStr) + '&time=' + encodeURIComponent(timeIso),
    Object.assign({ opacity, maxNativeZoom: 9, maxZoom: 11, pane: 'tilePane' }, extra || {}));
}

/* ---- generieke crossfade-manager voor een WMTS-laag (pijlen én kleurlaag) ---- */
function makeFadeManager(style, maxOpacity) {
  const layers = new Map();        // uur -> tileLayer
  let visibleHour = -1, fadeRAF = 0, on = false;
  function layerFor(hr) {
    if (layers.has(hr)) return layers.get(hr);
    const lyr = makeCmemsLayer(style, 0, isoHour(times[hr])).addTo(map);
    lyr.setOpacity(0);
    layers.set(hr, lyr);
    if (layers.size > 8) {                          // cache: verste ongebruikte laag weg
      let far = -1, fd = -1;
      for (const h of layers.keys()) {
        if (h === visibleHour || Math.abs(h - visibleHour) <= 1) continue;
        const d = Math.abs(h - visibleHour);
        if (d > fd) { fd = d; far = h; }
      }
      if (far >= 0) { map.removeLayer(layers.get(far)); layers.delete(far); }
    }
    return lyr;
  }
  function show(hr) {
    if (!times || !on) return;
    const target = layerFor(hr), prev = layers.get(visibleHour);
    if (target === prev) return;
    visibleHour = hr;
    layerFor(Math.min(NHOURS - 1, hr + 1));          // volgend uur voorladen
    layers.forEach(l => { if (l !== target && l !== prev) l.setOpacity(0); });
    cancelAnimationFrame(fadeRAF);
    const t0 = performance.now(), dur = 380;
    const of = target.options.opacity || 0, pf = prev ? (prev.options.opacity || 0) : 0;
    const step = now => {
      const k = Math.min(1, (now - t0) / dur);
      target.setOpacity(of + (maxOpacity - of) * k);
      if (prev && prev !== target) prev.setOpacity(pf * (1 - k));
      if (k < 1) fadeRAF = requestAnimationFrame(step);
    };
    fadeRAF = requestAnimationFrame(step);
  }
  function clear() { cancelAnimationFrame(fadeRAF); layers.forEach(l => map.removeLayer(l)); layers.clear(); visibleHour = -1; }
  return {
    show, clear,
    setOn(v) { on = v; if (!v) clear(); },
    get on() { return on; },
    get visibleHour() { return visibleHour; }
  };
}
let arrowFade = null, colorFade = null;   // aangemaakt zodra `times` bestaat

/* ---- kustlijnmasker uit de Copernicus kleurlaag (1,5 km): transparant = land ---- */
let maskLayer = null, maskData = null, maskW = 0, maskH = 0, maskRedrawT = null;
const maskCanvas = document.createElement('canvas');
const mctx = maskCanvas.getContext('2d', { willReadFrequently: true });
function ensureMask(want) {
  if (want && !maskLayer && times) {
    maskLayer = makeCmemsLayer('cmap:speed,vectorStyle:solid', 0, isoHour(times[Math.round(tFloat)]),
      { crossOrigin: 'anonymous', className: 'maskhide' });
    maskLayer.addTo(map);
    maskLayer.on('load', scheduleMaskRedraw);
  } else if (!want && maskLayer) {
    map.removeLayer(maskLayer); maskLayer = null; maskData = null;
  }
}
function scheduleMaskRedraw() { clearTimeout(maskRedrawT); maskRedrawT = setTimeout(redrawMask, 60); }
function redrawMask() {
  if (!maskLayer) return;
  const sz = map.getSize();
  if (maskCanvas.width !== sz.x || maskCanvas.height !== sz.y) { maskCanvas.width = sz.x; maskCanvas.height = sz.y; }
  mctx.clearRect(0, 0, sz.x, sz.y);
  const z = map.getZoom(), tiles = maskLayer._tiles || {};
  for (const k in tiles) {
    const t = tiles[k];
    if (!t || !t.el || !t.el.complete || t.el.naturalWidth === 0 || !t.coords) continue;
    const nw = map.unproject(L.point(t.coords.x * 256, t.coords.y * 256), t.coords.z);
    const p = map.latLngToContainerPoint(nw);
    const scale = 256 * Math.pow(2, z - t.coords.z);
    try { mctx.drawImage(t.el, p.x, p.y, scale, scale); } catch (e) {}
  }
  try { maskData = mctx.getImageData(0, 0, sz.x, sz.y).data; maskW = sz.x; maskH = sz.y; }
  catch (e) { maskData = null; }
}

/* ================= state ================= */
let times = null;            // Array(72) unix sec (UTC, hele uren)
let U = null, V = null;      // Float32Array (t * nLat * nLon), km/u; NaN = land
let seaCells = [];
let seaMask = null;          // Uint8Array(nLat*nLon): 1 = zeecel, 0 = land/geen data
let tFloat = 0;              // fractionele tijd-index (vloeiend)
let playing = false;

const $ = id => document.getElementById(id);
const statusEl = $('status'), slider = $('timeSlider'), timeLabel = $('timeLabel');

/* ================= data laden (Open-Meteo Marine — Copernicus SMOC) ================= */
const sleep = ms => new Promise(r => setTimeout(r, ms));
const CHUNK = 100;   // punten per verzoek (kleiner = betrouwbaarder)

async function fetchChunk(ch, attempt = 0) {
  const url = 'https://marine-api.open-meteo.com/v1/marine'
    + '?latitude=' + ch.map(p => p[0]).join(',')
    + '&longitude=' + ch.map(p => p[1]).join(',')
    + '&hourly=ocean_current_velocity,ocean_current_direction'
    + '&forecast_days=3&cell_selection=sea&timeformat=unixtime&timezone=GMT';
  try {
    const r = await fetch(url, { cache: 'no-store' });
    if ((r.status === 429 || r.status >= 500) && attempt < 4) { await sleep(700 * (attempt + 1)); return fetchChunk(ch, attempt + 1); }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    return Array.isArray(j) ? j : [j];
  } catch (e) {
    if (attempt < 3) { await sleep(600 * (attempt + 1)); return fetchChunk(ch, attempt + 1); }
    return null;   // deze chunk geven we op; de rest gaat door
  }
}

async function loadData() {
  statusEl.classList.remove('err');
  statusEl.textContent = 'Stromingsdata laden…';
  const pts = [];
  for (let i = 0; i < GRID.nLat; i++)
    for (let j = 0; j < GRID.nLon; j++)
      pts.push([+(GRID.lat0 + i * GRID.dLat).toFixed(2), +(GRID.lon0 + j * GRID.dLon).toFixed(2)]);
  const defs = [];
  for (let s = 0; s < pts.length; s += CHUNK) defs.push({ start: s, pts: pts.slice(s, s + CHUNK) });

  // hooguit 2 verzoeken tegelijk (voorkomt burst-limieten)
  const responses = new Array(defs.length).fill(null);
  for (let s = 0; s < defs.length; s += 2) {
    const batch = defs.slice(s, s + 2);
    const rs = await Promise.all(batch.map(d => fetchChunk(d.pts)));
    rs.forEach((r, i) => { responses[s + i] = r; });
  }

  const okResp = responses.find(Boolean);
  if (!okResp) throw new Error('geen enkel datablok geladen');
  const n = GRID.nLat * GRID.nLon;
  times = okResp[0].hourly.time.slice(0, NHOURS);
  U = new Float32Array(NHOURS * n).fill(NaN);
  V = new Float32Array(NHOURS * n).fill(NaN);
  seaCells = [];
  seaMask = new Uint8Array(n);
  let okChunks = 0;
  defs.forEach((d, ci) => {
    const resp = responses[ci];
    if (!resp) return;
    okChunks++;
    for (let k = 0; k < d.pts.length && k < resp.length; k++) {
      const p = d.start + k;
      const h = resp[k].hourly, vel = h.ocean_current_velocity, dir = h.ocean_current_direction;
      let isSea = false;
      for (let t = 0; t < NHOURS; t++) {
        const sp = vel[t], dd = dir[t];
        if (sp == null || dd == null) continue;
        const rad = dd * Math.PI / 180;
        U[t * n + p] = sp * Math.sin(rad);
        V[t * n + p] = sp * Math.cos(rad);
        isSea = true;
      }
      if (isSea) { seaCells.push(p); seaMask[p] = 1; }
    }
  });
  slider.max = String(NHOURS - 1);
  statusEl.textContent = okChunks === defs.length
    ? 'Live · voorspelling 72 uur · vloeiend interpolerend'
    : 'Live · deels geladen (' + okChunks + '/' + defs.length + ') — ververst zo automatisch';
}

/* ================= interpolatie (ruimte + tijd) ================= */
function sampleUVi(lat, lon, t) {   // ruimtelijk, bij heel-uur t
  const n = GRID.nLat * GRID.nLon;
  const fi = (lat - GRID.lat0) / GRID.dLat, fj = (lon - GRID.lon0) / GRID.dLon;
  const i0 = Math.floor(fi), j0 = Math.floor(fj);
  if (i0 < 0 || j0 < 0 || i0 >= GRID.nLat - 1 || j0 >= GRID.nLon - 1) return null;
  const wi = fi - i0, wj = fj - j0;
  let su = 0, sv = 0, sw = 0;
  for (let di = 0; di <= 1; di++) for (let dj = 0; dj <= 1; dj++) {
    const idx = t * n + (i0 + di) * GRID.nLon + (j0 + dj);
    const u = U[idx];
    if (Number.isNaN(u)) continue;
    const w = (di ? wi : 1 - wi) * (dj ? wj : 1 - wj);
    su += u * w; sv += V[idx] * w; sw += w;
  }
  if (sw < 0.25) return null;
  return [su / sw, sv / sw];
}
function isSeaAt(lat, lon) {          // ligt de dichtstbijzijnde rastercel in zee?
  if (!seaMask) return true;
  const i = Math.round((lat - GRID.lat0) / GRID.dLat), j = Math.round((lon - GRID.lon0) / GRID.dLon);
  if (i < 0 || j < 0 || i >= GRID.nLat || j >= GRID.nLon) return false;
  return seaMask[i * GRID.nLon + j] === 1;
}
function sampleUV(lat, lon, tf) {    // ruimtelijk + lineair in de tijd
  const t0 = Math.floor(tf);
  const w = tf - t0;
  const a = sampleUVi(lat, lon, t0);
  if (w < 1e-3 || t0 >= NHOURS - 1) return a;
  const b = sampleUVi(lat, lon, t0 + 1);
  if (!a) return b;
  if (!b) return a;
  return [a[0] * (1 - w) + b[0] * w, a[1] * (1 - w) + b[1] * w];
}

/* ================= deeltjesanimatie ================= */
const canvas = document.createElement('canvas');
canvas.id = 'currentCanvas';
map.getContainer().appendChild(canvas);
const ctx = canvas.getContext('2d');
let particles = [], particlesOn = false, arrowsOn = true, rafId = null, lastTs = 0;

const RAMP = [[0,'#9ec5f4'],[0.93,'#6da7ec'],[1.85,'#3987e5'],[2.8,'#256abf'],[3.7,'#184f95'],[4.6,'#0d366b']];
function speedColor(kmh) {
  for (let k = RAMP.length - 1; k >= 0; k--) if (kmh >= RAMP[k][0]) return RAMP[k][1];
  return RAMP[0][1];
}

function resizeCanvas() {
  const sz = map.getSize();
  canvas.width = sz.x * devicePixelRatio; canvas.height = sz.y * devicePixelRatio;
  canvas.style.width = sz.x + 'px'; canvas.style.height = sz.y + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

function spawnParticle(pt) {
  if (!seaCells.length) return pt;
  const b = map.getBounds();
  for (let tries = 0; tries < 30; tries++) {
    const c = seaCells[(Math.random() * seaCells.length) | 0];
    const lat = GRID.lat0 + ((c / GRID.nLon) | 0) * GRID.dLat + (Math.random() - .5) * GRID.dLat;
    const lon = GRID.lon0 + (c % GRID.nLon) * GRID.dLon + (Math.random() - .5) * GRID.dLon;
    if (b.contains([lat, lon]) && isSeaAt(lat, lon)) { pt.lat = lat; pt.lon = lon; pt.age = 60 + Math.random() * 140; return pt; }
  }
  const s = map.getSize();
  const ll = map.containerPointToLatLng([Math.random() * s.x, Math.random() * s.y]);
  pt.lat = ll.lat; pt.lon = ll.lng; pt.age = 20 + Math.random() * 60;
  return pt;
}

function resetParticles() {
  const z = map.getZoom();
  const count = Math.min(3200, Math.round(350 * Math.pow(1.55, z - 4)));
  particles = Array.from({ length: count }, () => spawnParticle({}));
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

/* pijl alleen waar de héle rastercel zee is (geen land-bleed langs de kust) */
function sampleUVarrow(lat, lon, tf) {
  if (!seaMask) return null;
  const fi = (lat - GRID.lat0) / GRID.dLat, fj = (lon - GRID.lon0) / GRID.dLon;
  const i0 = Math.floor(fi), j0 = Math.floor(fj);
  if (i0 < 0 || j0 < 0 || i0 >= GRID.nLat - 1 || j0 >= GRID.nLon - 1) return null;
  for (let di = 0; di <= 1; di++) for (let dj = 0; dj <= 1; dj++)
    if (!seaMask[(i0 + di) * GRID.nLon + (j0 + dj)]) return null;   // een hoek is land → geen pijl
  return sampleUV(lat, lon, tf);
}

/* vloeiende stroompijlen — getekend uit het (in de tijd geïnterpoleerde) veld */
function drawArrows() {
  const sz = map.getSize();
  const step = 44;                                   // schermafstand tussen pijlen (px)
  ctx.lineWidth = 1.6; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.globalAlpha = 1;
  for (let x = step * 0.6; x < sz.x; x += step) {
    for (let y = step * 0.6; y < sz.y; y += step) {
      // kustlijn: fijn kleurlaag-masker (land = transparant); val terug op grid-masker
      if (maskData) {
        const mx = x | 0, my = y | 0;
        if (mx < 0 || my < 0 || mx >= maskW || my >= maskH || maskData[(my * maskW + mx) * 4 + 3] <= 25) continue;
      }
      const ll = map.containerPointToLatLng([x, y]);
      const uv = maskData ? sampleUV(ll.lat, ll.lng, tFloat) : sampleUVarrow(ll.lat, ll.lng, tFloat);
      if (!uv) continue;
      const u = uv[0], v = uv[1], kmh = Math.hypot(u, v);
      if (kmh < 0.05) continue;
      const dx = u, dy = -v, m = Math.hypot(dx, dy) || 1;   // scherm: oost=+x, noord=-y
      const ux = dx / m, uy = dy / m;
      const len = Math.min(step * 0.5, 7 + kmh * 4.2);
      const hx = x + ux * len * 0.5, hy = y + uy * len * 0.5;
      const tx = x - ux * len * 0.5, ty = y - uy * len * 0.5;
      const ah = Math.min(5.5, len * 0.42), ang = Math.atan2(uy, ux);
      ctx.strokeStyle = speedColor(kmh);
      ctx.beginPath();
      ctx.moveTo(tx, ty); ctx.lineTo(hx, hy);
      ctx.lineTo(hx - ah * Math.cos(ang - 0.45), hy - ah * Math.sin(ang - 0.45));
      ctx.moveTo(hx, hy);
      ctx.lineTo(hx - ah * Math.cos(ang + 0.45), hy - ah * Math.sin(ang + 0.45));
      ctx.stroke();
    }
  }
}

function frame(ts) {
  rafId = requestAnimationFrame(frame);
  const dt = lastTs ? Math.min(0.08, (ts - lastTs) / 1000) : 0;  // s, gecapt tegen sprongen
  lastTs = ts;

  // vloeiend door de tijd bewegen tijdens afspelen
  if (playing && times) {
    tFloat += dt * PLAY_HPS;
    if (tFloat >= NHOURS - 1) tFloat = 0;
    updateTimeUI();
    updateWmtsTime();
  }

  if (!U || (!particlesOn && !arrowsOn)) return;
  const sz = map.getSize();

  if (particlesOn) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,0.040)';   // langere sporen (rustige stroomlijnen)
    ctx.fillRect(0, 0, sz.x, sz.y);
    ctx.globalCompositeOperation = 'source-over';
    ctx.lineWidth = 1.6; ctx.lineCap = 'round';
    // getij, geen wind → rustig tempo; nauwelijks opschalen bij inzoomen
    const speedScale = 0.00060 * Math.pow(1.18, map.getZoom() - 6);
    for (const p of particles) {
      if (--p.age <= 0) { spawnParticle(p); continue; }
      const uv = sampleUV(p.lat, p.lon, tFloat);
      if (!uv) { spawnParticle(p); continue; }
      const [u, v] = uv;
      const kmh = Math.hypot(u, v);
      const nLat = p.lat + v * speedScale / 1.5;
      const nLon = p.lon + u * speedScale / (1.5 * Math.cos(p.lat * Math.PI / 180));
      const a = map.latLngToContainerPoint([p.lat, p.lon]);
      const b2 = map.latLngToContainerPoint([nLat, nLon]);
      if (b2.x < -20 || b2.y < -20 || b2.x > sz.x + 20 || b2.y > sz.y + 20) { spawnParticle(p); continue; }
      // kustlijn volgen: land = transparant in de Copernicus kleurlaag (val terug op grid-masker)
      let onLand;
      if (maskData) { const mx = b2.x | 0, my = b2.y | 0; onLand = mx < 0 || my < 0 || mx >= maskW || my >= maskH || maskData[(my * maskW + mx) * 4 + 3] <= 25; }
      else onLand = !isSeaAt(nLat, nLon);
      if (onLand) { spawnParticle(p); continue; }
      p.lat = nLat; p.lon = nLon;
      ctx.strokeStyle = speedColor(kmh);
      ctx.globalAlpha = Math.min(0.95, 0.4 + kmh / 4);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b2.x, b2.y); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  } else {
    ctx.clearRect(0, 0, sz.x, sz.y);
  }

  if (arrowsOn) drawArrows();
}

map.on('resize', () => { resizeCanvas(); resetParticles(); scheduleMaskRedraw(); });
map.on('moveend zoomend', () => { resetParticles(); scheduleMaskRedraw(); });
map.on('movestart zoomstart', () => ctx.clearRect(0, 0, canvas.width, canvas.height));
resizeCanvas();

/* ================= tijd & lagen ================= */
const fmt = new Intl.DateTimeFormat('nl-NL', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
function interpUnix() {
  if (!times) return Date.now() / 1000;
  const t0 = Math.floor(tFloat), t1 = Math.min(NHOURS - 1, t0 + 1), w = tFloat - t0;
  return times[t0] * (1 - w) + times[t1] * w;
}
function updateTimeUI() {
  if (!times) return;
  timeLabel.textContent = fmt.format(new Date(interpUnix() * 1000));
  slider.value = String(tFloat);
}
let lastWmtsHour = -1;
function updateWmtsTime() {
  if (!times) return;
  const hr = Math.round(tFloat);
  if (hr === lastWmtsHour) return;         // WMTS bestaat alleen per heel uur
  lastWmtsHour = hr;
  if (arrowFade && arrowFade.on) arrowFade.show(hr);   // pijlen: zachte crossfade
  if (colorFade && colorFade.on) colorFade.show(hr);   // kleurlaag: zachte crossfade
}
function setTimeFloat(tf) {
  tFloat = Math.max(0, Math.min(NHOURS - 1, tf));
  updateTimeUI(); updateWmtsTime();
}
slider.addEventListener('input', () => {
  playing = false; $('playBtn').textContent = '▶';
  setTimeFloat(+slider.value);
});
$('nowBtn').addEventListener('click', () => { if (times) { playing = false; $('playBtn').textContent = '▶'; setTimeFloat(nowIndex()); } });
function nowIndex() {
  const now = Date.now() / 1000;
  let best = 0;
  for (let i = 0; i < times.length; i++) if (Math.abs(times[i] - now) < Math.abs(times[best] - now)) best = i;
  return best;
}
$('playBtn').addEventListener('click', () => {
  playing = !playing;
  $('playBtn').textContent = playing ? '❚❚' : '▶';
});

/* lagen aan/uit */
function syncLayers() {
  if (!arrowFade) return;                 // managers klaar zodra `times` bestaat (via start)
  const hr = Math.round(tFloat);
  arrowFade.setOn($('cbWmts').checked);
  if (arrowFade.on && arrowFade.visibleHour < 0) arrowFade.show(hr);
  colorFade.setOn($('cbCmems').checked);
  if (colorFade.on && colorFade.visibleHour < 0) colorFade.show(hr);
  lastWmtsHour = hr;
  particlesOn = $('cbParticles').checked;
  arrowsOn = $('cbArrows').checked;
  ensureMask(particlesOn || arrowsOn);    // kustlijnmasker (kleurlaag) laden bij deeltjes én eigen pijlen
  if (particlesOn || arrowsOn) scheduleMaskRedraw();
  canvas.style.display = (particlesOn || arrowsOn) ? 'block' : 'none';
  document.getElementById('legend').style.display = (particlesOn || arrowsOn) ? 'block' : 'none';
  if (particlesOn) resetParticles();
}
['cbParticles', 'cbCmems', 'cbArrows', 'cbWmts'].forEach(id => $(id).addEventListener('change', syncLayers));

/* klik-popup */
map.on('click', e => {
  if (!U) return;
  const uv = sampleUV(e.latlng.lat, e.latlng.lng, tFloat);
  if (!uv) return;
  const [u, v] = uv;
  const kmh = Math.hypot(u, v), kn = kmh / 1.852, ms = kmh / 3.6;
  const dir = (Math.atan2(u, v) * 180 / Math.PI + 360) % 360;
  const pijl = '<span class="dirArrow" style="transform:rotate(' + dir + 'deg);display:inline-block">↑</span>';
  L.popup().setLatLng(e.latlng).setContent(
    '<b>' + kn.toFixed(1) + ' kn</b> (' + ms.toFixed(2) + ' m/s · ' + kmh.toFixed(1) + ' km/u)<br>'
    + 'richting ' + Math.round(dir) + '° ' + pijl + '<br>'
    + '<span style="color:var(--muted)">' + fmt.format(new Date(interpUnix() * 1000)) + '</span>'
  ).openOn(map);
});

/* ================= start ================= */
function defaultTimes() {            // 72 hele uren vanaf middernacht UTC — zelfde as als de Open-Meteo-grid
  const midnight = Math.floor(Date.now() / 86400000) * 86400;
  return Array.from({ length: NHOURS }, (_, i) => midnight + i * 3600);
}
// interface + Copernicus-pijlen draaien onafhankelijk van de (zwaardere) grid-data
times = defaultTimes();
arrowFade = makeFadeManager('cmap:speed,vectorStyle:vector', 0.92);
colorFade = makeFadeManager('cmap:speed,vectorStyle:solid', 0.55);
setTimeFloat(nowIndex());
syncLayers();
requestAnimationFrame(frame);
statusEl.textContent = 'Copernicus-pijlen live · deeltjesdata laden…';

function afterLoad() {               // grid geladen → deeltjes/eigen pijlen kunnen erbij
  setTimeFloat(nowIndex());
  syncLayers();
}
function tryLoad(retryMs) {
  loadData().then(afterLoad).catch(err => {
    console.error(err);
    statusEl.classList.add('err');
    statusEl.textContent = 'Deeltjesdata even niet bereikbaar — Copernicus-pijlen werken wel · nieuwe poging over ' + Math.round(retryMs / 1000) + 's…';
    setTimeout(() => tryLoad(Math.min(retryMs * 2, 300000)), retryMs);
  });
}
tryLoad(12000);
setInterval(() => { loadData().then(() => { statusEl.classList.remove('err'); }).catch(() => {}); }, 6 * 3600 * 1000);
</script>
</body>
